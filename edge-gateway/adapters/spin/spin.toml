spin_manifest_version = 2

[application]
name = "clipclap-edge-gateway"
version = "0.1.0"
description = "ClipClap Edge Gateway — Spin (Akamai Functions) adapter"

[variables]
inference_url = { required = true }
gateway_region = { default = "us-east-1" }

[[trigger.http]]
route = "/..."
component = "gateway"

[component.gateway]
source = "../../target/wasm32-wasip1/release/clipclap_gateway_spin.wasm"
allowed_outbound_hosts = ["{{ inference_url }}"]

[component.gateway.variables]
inference_url = "{{ inference_url }}"
gateway_region = "{{ gateway_region }}"

[component.gateway.build]
command = "cargo build --target wasm32-wasip1 --release --manifest-path ../../Cargo.toml -p clipclap-gateway-spin"
